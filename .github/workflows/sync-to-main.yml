name: Sync to LAD Main Repositories

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-backend:
    runs-on: ubuntu-latest
    # Only run on main branch
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git credentials
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Verify LAD_REPO_TOKEN
        run: |
          if [ -z "${{ secrets.LAD_REPO_TOKEN }}" ]; then
            echo "❌ LAD_REPO_TOKEN secret is not set!"
            exit 1
          fi
          echo "✅ LAD_REPO_TOKEN is configured"

      - name: Checkout LAD-Backend
        env:
          GH_TOKEN: ${{ secrets.LAD_REPO_TOKEN }}
        run: |
          echo "📥 Cloning LAD-Backend repository..."
          git clone --depth=1 --branch=develop "https://oauth2:${GH_TOKEN}@github.com/techiemaya-admin/LAD-Backend.git" lad-backend
          cd lad-backend
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          echo "✅ LAD-Backend cloned successfully"

      - name: Copy backend files
        run: |
          echo "📦 Starting backend file sync..."
          
          # Verify source exists
          if [ ! -d "backend/features/ai-icp-assistant" ]; then
            echo "❌ Source directory not found: backend/features/ai-icp-assistant"
            exit 1
          fi
          
          # Ensure destination exists
          mkdir -p lad-backend/features/ai-icp-assistant
          
          # Sync files WITHOUT delete (safer - only adds/updates)
          if ! rsync -av \
            --exclude='.env*' \
            --exclude='*.local.js' \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            backend/features/ai-icp-assistant/ lad-backend/features/ai-icp-assistant/; then
            echo "❌ rsync failed!"
            exit 1
          fi
          
          echo "✅ Files synced successfully"

      - name: Verify critical files
        run: |
          echo "🔍 Verifying critical files..."
          MISSING=0
          
          # Check for essential files
          CRITICAL_FILES=(
            "lad-backend/features/ai-icp-assistant/manifest.js"
            "lad-backend/features/ai-icp-assistant/routes/index.js"
            "lad-backend/features/ai-icp-assistant/controllers/AIAssistantController.js"
            "lad-backend/features/ai-icp-assistant/repositories/index.js"
          )
          
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ CRITICAL: $file is missing!"
              MISSING=1
            else
              echo "✅ $file exists"
            fi
          done
          
          if [ $MISSING -eq 1 ]; then
            echo "❌ Sync validation failed - critical files missing"
            exit 1
          fi
          
          echo "✅ All critical files verified"

      - name: Commit and push to LAD-Backend
        working-directory: lad-backend
        run: |
          # Stage changes first
          git add features/ai-icp-assistant/
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          # Show what changed
          echo "📝 Changes to be committed:"
          git diff --staged --stat
          
          # Commit changes
          git commit -m "feat(ai-icp-assistant): auto-sync from feature repo" \
            -m "Synced from: ${{ github.repository }}@${{ github.sha }}" \
            -m "Triggered by: ${{ github.actor }}" \
            -m "Timestamp: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" \
            -m "Workflow: ${{ github.workflow }}"
          
          # Push with retry logic using merge strategy (safer than rebase)
          echo "📤 Pushing to LAD-Backend..."
          for attempt in {1..3}; do
            if git push origin develop; then
              echo "✅ Push successful on attempt $attempt"
              exit 0
            fi
            
            echo "⚠️ Push failed, retrying ($attempt/3)..."
            sleep 2
            
            # Pull with merge strategy (safer than rebase for automation)
            if ! git pull origin develop --no-rebase; then
              echo "⚠️ Merge conflict detected, attempting auto-resolution..."
              
              # Accept incoming changes for ai-icp-assistant (our changes win)
              git checkout --ours features/ai-icp-assistant/
              git add features/ai-icp-assistant/
              
              # Complete the merge
              git commit --no-edit || true
            fi
          done
          
          # Final push attempt
          if git push origin develop; then
            echo "✅ Push successful after conflict resolution"
            exit 0
          else
            echo "❌ Failed to push after 3 attempts and conflict resolution"
            exit 1
          fi

  notify-success:
    needs: [sync-backend]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Success notification
        run: |
          echo "✅ Successfully synced ai-icp-assistant feature to LAD-Backend"
          echo "Backend: ✅"

  notify-failure:
    needs: [sync-backend]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Failure notification
        run: |
          echo "❌ Sync to LAD repositories failed"
          echo "Check workflow logs for details"
          exit 1
